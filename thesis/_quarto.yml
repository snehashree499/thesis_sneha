project:
  type: book
  output-dir: _book

book:
  title: "Design and FPGA Prototyping of a LED Driver for Aircraft Cabin Lightning with Open-Source Tools"
  author:
    - name: "Sneha Shree Katepalli"
      email: "skatepalli@hs-bremen.de"
      orcid: ""
      corresponding: true
      roles: "Lead author"
      affiliation:
        - id: hsb
        - name: "Hochschule Bremen - City University of Applied Sciences"
          city: "Bremen"
          state: "Germany"
          url: "https://www.hs-bremen.de"
          department: "School of Electrical Engineering and Computer Sciences"

  date: "26 November 2025"
  date-format: "MMMM YYYY"
  # license: "Apache-2.0 license"

  reader-mode: true

  page-footer:
    left: |
      Design and FPGA Prototyping of a LED Driver for Aircraft Cabin Lightning with Open-Source Tools
    right: |
      This book was built with <a href="https://quarto.org/">Quarto</a>.
  # cover-image: images/hsb-logo.png
  # favicon: images/hsb-logo.png
  # site-url: https://sneha.github.io/thesis
  repo-url: https://gitlab.on.hs-bremen.de/skatepalli/thesis_sneha
  repo-branch: main
  repo-actions: [edit,issue]
  downloads: [pdf,epub]

  chapters:
    - frontmatter/02-declaration.qmd
    - frontmatter/03-abstract.qmd
    - frontmatter/04-acknowledgements.qmd
    - index.qmd
    - content/01_introduction.qmd
    - content/02_requirements.qmd
    - references.qmd
    
  appendices:
    - content/_appendix_A.qmd
    - content/_appendix_B.qmd
    - content/_appendix_C.qmd

  output-file: "thesis_ssk"

# Bibliography
bibliography: _bibliography/references.bib
csl: _bibliography/ieee.csl

number-sections: true
highlight-style: pygments

format:
  html:
    theme: flatly
    fontsize: 1.2em
    linestretch: 1.7
    # mainfont: Helvetica Neue, Helvetica, Arial, sans
    # monofont: Cascadia Mono, Menlo, Consolas, Courier New, Courier
    # backgroundcolor: "white"
    # fontcolor: "black"
    highlight-style: github

  epub:
    theme: flatly
    fontsize: 1.2em
    linestretch: 1.7
    # mainfont: Helvetica Neue, Helvetica, Arial, sans
    # monofont: Cascadia Mono, Menlo, Consolas, Courier New, Courier
    # backgroundcolor: "white"
    # fontcolor: "black"
    highlight-style: github

  pdf:
    documentclass: scrbook
    classoption: [twoside]
    keep-tex: true

    papersize: a4
    fig-pos: "H"

    toc: true
    toc-depth: 3
    toc-title: "Table of contents"
    lof: true
    lot: true

    number-sections: true
    number-depth: 2
        
    geometry:
      # - inner=3cm
      # - outer=4cm
      - top=2.5cm
      - bottom=2.5cm
      - left=3cm
      - right=1.5cm
      # - headsep=22pt
      # - headheight=11pt
      # - footskip=33pt
      - ignorehead
      # - ignorefoot
      - heightrounded

    hyperrefoptions: 
      - linktoc=all
    colorlinks: true
    linkcolor: "blue"

    fontsize: 11pt
    pdfengine: xelatex

    # Fonts
    mainfont: "Latin Modern Roman"
    # sansfont: "Arial"
    # monofont: "Courier New"
    # mathfont: "TeX Gyre Termes Math"
    
    include-in-header:
      - frontmatter/header.tex

    template-partials: []

    include-before-body: 
      - frontmatter/titlepage.tex

